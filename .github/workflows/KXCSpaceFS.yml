name: KXCSpaceFS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  linux-build:
  
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo add-apt-repository "deb http://archive.ubuntu.com/ubuntu/ questing main universe restricted multiverse"
        sudo add-apt-repository "deb http://archive.ubuntu.com/ubuntu/ questing-updates main universe restricted multiverse"
        sudo apt-get update
        sudo apt-get install -m -y gcc build-essential linux-image-generic linux-headers-generic
    - name: Update Kernel Source
      if: success() || failure()
      run: |
        cd /lib/modules/$(uname -r)
        sudo rm build
        sudo ln -s /usr/src/linux-headers-6*-generic build
    - name: Setup
      if: success() || failure()
      run: mkdir build
    - name: Make
      if: success() || failure()
      run: make all -f src/Makefile
    - name: Upload mkfs.KXCSpaceFS
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: mkfs.KXCSpaceFS
        path: /home/runner/work/KXCSpaceFS/KXCSpaceFS/build/mkfs.kxcspacefs
    - name: Upload KXCSpaceFS.ko
      uses: actions/upload-artifact@v4
      with:
        name: KXCSpaceFS.ko
        path: /home/runner/work/KXCSpaceFS/KXCSpaceFS/build/kxcspacefs.ko
